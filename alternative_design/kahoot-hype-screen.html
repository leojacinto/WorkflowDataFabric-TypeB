<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kahoot Ready</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1f1f;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  canvas { display: block; position: absolute; top: 0; left: 0; }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
  }

  /* === SERVICENOW LOGO PLACEHOLDER === */
  .sn-logo {
    width: 220px;
    height: 52px;
    /* PLACEHOLDER: replace this div with an <img> or inline SVG of the ServiceNow logo */
    background: rgba(255,255,255,0.08);
    border: 1px dashed rgba(255,255,255,0.25);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 36px;
    animation: logoFade 1.2s ease-out both;
  }

  .headline {
    font-size: clamp(42px, 6vw, 82px);
    font-weight: 800;
    text-align: center;
    line-height: 1.05;
    letter-spacing: -1px;
    animation: riseIn 0.9s cubic-bezier(.16,1,.3,1) 0.3s both;
  }
  .headline .top {
    display: block;
    color: rgba(255,255,255,0.92);
  }
  .headline .bottom {
    display: block;
    background: linear-gradient(90deg, #44d84a, #2ee8a0, #44d84a);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s ease-in-out infinite;
  }

  .subtitle {
    margin-top: 20px;
    font-size: clamp(14px, 2vw, 22px);
    color: rgba(255,255,255,0.5);
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: riseIn 0.9s cubic-bezier(.16,1,.3,1) 0.55s both;
  }

  .pulse-ring {
    margin-top: 44px;
    width: 80px;
    height: 80px;
    position: relative;
    animation: riseIn 0.9s cubic-bezier(.16,1,.3,1) 0.8s both;
  }
  .pulse-ring::before, .pulse-ring::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid rgba(68,216,74,0.4);
    animation: pulseOut 2.4s ease-out infinite;
  }
  .pulse-ring::after {
    animation-delay: 1.2s;
  }
  .pulse-ring .dot {
    position: absolute;
    inset: 24px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 38%, #5eff6a, #2ab84a);
    box-shadow: 0 0 30px rgba(68,216,74,0.5), 0 0 80px rgba(68,216,74,0.15);
    animation: dotPulse 2.4s ease-in-out infinite;
  }

  /* Floating Kahoot-colored diamonds */
  .diamonds {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }
  .diamond {
    position: absolute;
    width: 18px;
    height: 18px;
    transform: rotate(45deg);
    border-radius: 3px;
    opacity: 0;
    animation: floatDiamond linear infinite;
  }

  @keyframes logoFade {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  @keyframes pulseOut {
    0% { transform: scale(0.8); opacity: 0.7; }
    100% { transform: scale(2.2); opacity: 0; }
  }
  @keyframes dotPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }
  @keyframes floatDiamond {
    0% { transform: rotate(45deg) translateY(0) scale(0); opacity: 0; }
    10% { opacity: 0.7; transform: rotate(45deg) translateY(0) scale(1); }
    90% { opacity: 0.5; }
    100% { transform: rotate(45deg) translateY(-110vh) scale(0.6); opacity: 0; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="diamonds" id="diamonds"></div>

<div class="overlay">
  <!-- PLACEHOLDER: Replace this div with your ServiceNow logo -->
  <div class="sn-logo">servicenow logo</div>

  <div class="headline">
    <span class="top">Are You Ready?</span>
    <span class="bottom">Let's Kahoot!</span>
  </div>
  <div class="subtitle">WDF &amp; RaptorDB Pro Workshop</div>

  <div class="pulse-ring">
    <div class="dot"></div>
  </div>
</div>

<script>
// === FABRIC GRID (from the WDF hero animation) ===
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = canvas.width = window.innerWidth * dpr;
  H = canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
resize();
window.addEventListener('resize', resize);

const COLS = 60, ROWS = 60, SP = 16;
const fov = 600, camH = 220, camD = 380;
const rotX = -0.82, rotZ = 0.38;

const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
const cosZ = Math.cos(rotZ), sinZ = Math.sin(rotZ);

function hAt(x, y, t) {
  return Math.sin(x * 0.04 + t * 1.1) * 28
       + Math.cos(y * 0.035 + t * 0.8) * 22
       + Math.sin((x + y) * 0.025 + t * 0.6) * 18;
}

function proj(wx, wy, wz) {
  let x1 = wx * cosZ - wy * sinZ;
  let y1 = wx * sinZ + wy * cosZ;
  let y2 = y1 * cosX - wz * sinX;
  let z2 = y1 * sinX + wz * cosX;
  const ez = z2 - camD;
  const ey = y2 - camH;
  if (ez >= -10) return null;
  const sc = fov / -ez;
  return { x: W / 2 + x1 * sc, y: H / 2 + ey * sc, sc, ez };
}

const cx = (COLS - 1) * SP / 2, cy = (ROWS - 1) * SP / 2;

let t = 0;

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Radial bg glow
  const grd = ctx.createRadialGradient(W * 0.5, H * 0.45, 0, W * 0.5, H * 0.45, W * 0.55);
  grd.addColorStop(0, 'rgba(30,80,60,0.12)');
  grd.addColorStop(1, 'rgba(13,31,31,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  // Horizontal
  for (let r = 0; r < ROWS; r++) {
    ctx.beginPath();
    let started = false;
    for (let c = 0; c < COLS; c++) {
      const wx = c * SP - cx, wy = r * SP - cy;
      const wz = hAt(wx, wy, t);
      const p = proj(wx, wy, wz);
      if (!p) continue;
      const fade = Math.max(0, Math.min(1, 1 - Math.sqrt(wx * wx + wy * wy) / (cx * 1.1)));
      if (fade < 0.02) continue;
      if (!started) { ctx.moveTo(p.x, p.y); started = true; }
      else ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = 'rgba(68,216,74,0.13)';
    ctx.lineWidth = 0.8 * dpr;
    ctx.stroke();
  }
  // Vertical
  for (let c = 0; c < COLS; c++) {
    ctx.beginPath();
    let started = false;
    for (let r = 0; r < ROWS; r++) {
      const wx = c * SP - cx, wy = r * SP - cy;
      const wz = hAt(wx, wy, t);
      const p = proj(wx, wy, wz);
      if (!p) continue;
      const fade = Math.max(0, Math.min(1, 1 - Math.sqrt(wx * wx + wy * wy) / (cx * 1.1)));
      if (fade < 0.02) continue;
      if (!started) { ctx.moveTo(p.x, p.y); started = true; }
      else ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = 'rgba(68,216,74,0.10)';
    ctx.lineWidth = 0.8 * dpr;
    ctx.stroke();
  }

  // Intersection glows on peaks
  for (let r = 0; r < ROWS; r += 3) {
    for (let c = 0; c < COLS; c += 3) {
      const wx = c * SP - cx, wy = r * SP - cy;
      const wz = hAt(wx, wy, t);
      if (wz < 10) continue;
      const p = proj(wx, wy, wz);
      if (!p) continue;
      const fade = Math.max(0, Math.min(1, 1 - Math.sqrt(wx * wx + wy * wy) / (cx * 1.05)));
      const intensity = fade * ((wz - 10) / 50) * 0.18;
      if (intensity < 0.01) continue;
      const gr = 5 * p.sc * dpr;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, gr);
      g.addColorStop(0, `rgba(100,255,140,${intensity})`);
      g.addColorStop(1, 'rgba(100,255,140,0)');
      ctx.fillStyle = g;
      ctx.fillRect(p.x - gr, p.y - gr, gr * 2, gr * 2);
    }
  }

  t += 0.012;
  requestAnimationFrame(draw);
}
draw();

// === FLOATING KAHOOT DIAMONDS ===
const kahootColors = [
  'rgba(226,27,60,0.6)',   // red
  'rgba(19,104,206,0.6)',  // blue
  'rgba(216,158,0,0.55)',  // yellow
  'rgba(38,137,12,0.6)',   // green
];
const dContainer = document.getElementById('diamonds');

function spawnDiamond() {
  const el = document.createElement('div');
  el.className = 'diamond';
  const color = kahootColors[Math.floor(Math.random() * kahootColors.length)];
  const left = Math.random() * 100;
  const size = 10 + Math.random() * 16;
  const dur = 8 + Math.random() * 12;
  const delay = Math.random() * 2;
  el.style.cssText = `
    left: ${left}%;
    bottom: -30px;
    width: ${size}px;
    height: ${size}px;
    background: ${color};
    animation-duration: ${dur}s;
    animation-delay: ${delay}s;
    box-shadow: 0 0 ${size}px ${color};
  `;
  dContainer.appendChild(el);
  setTimeout(() => el.remove(), (dur + delay) * 1000);
}

// Stagger initial burst
for (let i = 0; i < 15; i++) setTimeout(spawnDiamond, i * 200);
setInterval(spawnDiamond, 600);
</script>
</body>
</html>
